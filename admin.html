<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | 25experts</title>
  <meta name="page-version" content="v2026.05.12.7">
  <meta name="page-updated" content="2026-05-12">
  <meta name="version-policy" content="Update page-version and page-updated on every content, design, SEO, or behavior change.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#145f47">
  <style>
    :root {
      --ink: #101615;
      --muted: #66716e;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --line: #dfe5df;
      --green: #145f47;
      --mint: #e9f5ef;
      --gold: #b87a22;
      --gold2: #fff1d8;
      --red: #c0392b;
      --red2: #fef2f2;
      --shadow: 0 18px 46px rgba(17,31,25,.1);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; background: var(--paper); color: var(--ink); line-height: 1.45; }
    a { color: inherit; text-decoration: none; }
    h2, h3, p { margin-top: 0; }
    button { font: inherit; }

    .topbar { padding: 9px 18px; background: var(--green); color: #fff; font-size: 13px; text-align: center; font-weight: 650; }

    .admin-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px clamp(18px,4vw,56px); background: var(--panel); border-bottom: 1px solid var(--line); }
    .admin-header h1 { margin: 0; font-size: 20px; font-weight: 900; }
    .admin-header span { color: var(--muted); font-size: 13px; }
    .signout-btn { min-height: 36px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--line); background: var(--red2); color: var(--red); font-weight: 900; font-size: 13px; cursor: pointer; }

    .page { max-width: 1360px; margin: 0 auto; padding: 28px clamp(18px,4vw,56px) 80px; display: grid; gap: 28px; }

    .section-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; }
    .section-head { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .section-head h2 { margin: 0; font-size: 17px; font-weight: 900; }
    .section-head span { color: var(--muted); font-size: 13px; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); border-bottom: 1px solid var(--line); background: var(--paper); white-space: nowrap; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: #fafbfa; }

    .role-badge { display: inline-flex; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 900; letter-spacing: .04em; }
    .role-badge.patron          { background: #e6f0fb; color: #295b8f; }
    .role-badge.contributor     { background: var(--mint); color: var(--green); }
    .role-badge.expert          { background: var(--gold2); color: var(--gold); }
    .role-badge.founding_expert { background: #f0e8ff; color: #6b3fa0; }
    .role-badge.admin           { background: var(--red2); color: var(--red); }

    .role-select { min-height: 34px; padding: 0 10px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font: inherit; font-size: 13px; font-weight: 700; }
    .save-btn { min-height: 34px; padding: 0 12px; border: 0; border-radius: 6px; background: var(--green); color: #fff; font: inherit; font-size: 13px; font-weight: 900; cursor: pointer; }
    .save-btn:disabled { opacity: .5; cursor: default; }
    .save-btn.saved { background: #2a6e50; }

    .status-badge { display: inline-flex; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 900; }
    .status-badge.pending { background: var(--gold2); color: var(--gold); }
    .status-badge.live    { background: var(--mint); color: var(--green); }
    .status-badge.expired { background: #f2f2f2; color: var(--muted); }

    .action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .approve-btn { min-height: 32px; padding: 0 12px; border: 0; border-radius: 6px; background: var(--green); color: #fff; font: inherit; font-size: 13px; font-weight: 900; cursor: pointer; white-space: nowrap; }
    .reject-btn  { min-height: 32px; padding: 0 12px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--muted); font: inherit; font-size: 13px; font-weight: 900; cursor: pointer; white-space: nowrap; }
    .featured-toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; }
    .featured-toggle input { accent-color: var(--gold); width: 14px; height: 14px; }

    .empty-state { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }
    .loading-state { padding: 36px; text-align: center; color: var(--muted); font-size: 14px; }
    .access-denied { padding: 80px 24px; text-align: center; }
    .access-denied h2 { font-size: 24px; margin-bottom: 10px; }
    .access-denied p { color: var(--muted); max-width: 520px; margin: 0 auto; }
    .notice { border: 1px solid rgba(184,122,34,.24); background: var(--gold2); border-radius: 8px; padding: 14px 16px; color: #67450f; font-size: 13px; line-height: 1.55; }
    .notice code { background: rgba(0,0,0,.08); padding: 1px 5px; border-radius: 4px; font-family: monospace; }

    :focus-visible { outline: 2px solid var(--green); outline-offset: 3px; border-radius: 3px; }
    @media (max-width: 760px) { td, th { padding: 9px 10px; } }
  </style>
</head>
<body>

  <div class="topbar">
    <strong>25experts Admin</strong> — internal tool, not publicly linked.
  </div>

  <div class="admin-header">
    <div>
      <h1>Admin Dashboard</h1>
      <span id="admin-user-label">Checking access…</span>
    </div>
    <button class="signout-btn" id="signout-btn">Sign out</button>
  </div>

  <div id="page-root">
    <div class="loading-state">Checking access…</div>
  </div>

  <script type="module">
    import { auth, db } from "./assets/firebase-init.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const ROLES = ["patron", "contributor", "expert", "founding_expert", "admin"];

    document.getElementById("signout-btn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "join.html";
    });

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = "join.html"; return; }
      document.getElementById("admin-user-label").textContent = user.displayName || user.email;

      const userSnap = await getDoc(doc(db, "users", user.uid));
      if (!userSnap.exists() || userSnap.data().role !== "admin") {
        document.getElementById("page-root").innerHTML = `
          <div class="page"><div class="access-denied">
            <h2>Access denied</h2>
            <p>Your account does not have admin access. Ask an existing admin to set your role to <strong>admin</strong> in the Firebase Console → Firestore → users collection.</p>
          </div></div>`;
        return;
      }

      renderAdminPage();
    });

    async function renderAdminPage() {
      document.getElementById("page-root").innerHTML = `
        <div class="page" id="admin-page">
          <div class="notice">
            <strong>First-time setup:</strong> To grant admin to the first account, open Firebase Console → Firestore → <code>users</code> collection → find the document by UID → set <code>role</code> field to <code>"admin"</code>.
          </div>

          <div class="section-card">
            <div class="section-head"><h2>Users</h2><span id="user-count"></span></div>
            <div id="users-content"><div class="loading-state">Loading users…</div></div>
          </div>

          <div class="section-card">
            <div class="section-head"><h2>Job Postings</h2><span id="jobs-count"></span></div>
            <div id="jobs-content"><div class="loading-state">Loading jobs…</div></div>
          </div>
        </div>`;

      loadUsers();
      loadJobs();
    }

    async function loadUsers() {
      const container = document.getElementById("users-content");
      try {
        const snap  = await getDocs(collection(db, "users"));
        const users = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));

        document.getElementById("user-count").textContent =
          users.length + " account" + (users.length !== 1 ? "s" : "");

        if (users.length === 0) {
          container.innerHTML = `<div class="empty-state">No users yet.</div>`;
          return;
        }

        const tbody = document.createElement("tbody");
        users.forEach(u => {
          const joined   = u.createdAt ? new Date(u.createdAt.toMillis()).toLocaleDateString() : "—";
          const role     = u.role || "patron";
          const options  = ROLES.map(r => `<option value="${r}"${r === role ? " selected" : ""}>${r}</option>`).join("");
          const tr       = document.createElement("tr");
          tr.innerHTML   = `
            <td>${u.displayName || "—"}</td>
            <td style="color:var(--muted);font-size:13px;">${u.email || "—"}</td>
            <td id="badge-${u.id}"><span class="role-badge ${role}">${role}</span></td>
            <td style="color:var(--muted);font-size:12px;">${joined}</td>
            <td>
              <div class="action-row">
                <select class="role-select" id="rs-${u.id}"><option value="">Change role…</option>${options}</select>
                <button class="save-btn" id="sb-${u.id}">Save</button>
              </div>
            </td>`;
          tbody.appendChild(tr);
          tr.querySelector(`#sb-${u.id}`).addEventListener("click", () => saveRole(u.id));
        });

        const table = document.createElement("table");
        table.innerHTML = `<thead><tr>
          <th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th>
        </tr></thead>`;
        table.appendChild(tbody);
        container.innerHTML = "";
        container.appendChild(table);
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="empty-state">Failed to load users.</div>`;
      }
    }

    async function saveRole(uid) {
      const select  = document.getElementById(`rs-${uid}`);
      const btn     = document.getElementById(`sb-${uid}`);
      const newRole = select.value;
      if (!newRole) return;
      btn.disabled    = true;
      btn.textContent = "Saving…";
      try {
        await updateDoc(doc(db, "users", uid), { role: newRole });
        document.getElementById(`badge-${uid}`).innerHTML = `<span class="role-badge ${newRole}">${newRole}</span>`;
        btn.textContent = "Saved ✓";
        btn.classList.add("saved");
        setTimeout(() => { btn.textContent = "Save"; btn.classList.remove("saved"); btn.disabled = false; }, 2000);
      } catch (err) {
        console.error(err);
        btn.textContent = "Error";
        setTimeout(() => { btn.textContent = "Save"; btn.disabled = false; }, 2000);
      }
    }

    async function loadJobs() {
      const container = document.getElementById("jobs-content");
      try {
        const snap = await getDocs(collection(db, "jobs"));
        const jobs = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => {
            const order = { pending: 0, live: 1, expired: 2 };
            const oa = order[a.status] ?? 3, ob = order[b.status] ?? 3;
            if (oa !== ob) return oa - ob;
            return (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0);
          });

        document.getElementById("jobs-count").textContent =
          jobs.length + " listing" + (jobs.length !== 1 ? "s" : "");

        if (jobs.length === 0) {
          container.innerHTML = `<div class="empty-state">No job submissions yet.</div>`;
          return;
        }

        const tbody = document.createElement("tbody");
        jobs.forEach(j => {
          const submitted = j.createdAt ? new Date(j.createdAt.toMillis()).toLocaleDateString() : "—";
          const tr        = document.createElement("tr");
          tr.id           = `jr-${j.id}`;
          tr.innerHTML    = `
            <td style="font-weight:750;max-width:200px;">${j.title || "—"}</td>
            <td style="color:var(--muted);font-size:13px;">${j.company || "—"}</td>
            <td style="font-size:13px;">${j.domain || "—"}</td>
            <td style="font-size:13px;">${j.type || "—"}</td>
            <td id="sc-${j.id}"><span class="status-badge ${j.status || "pending"}">${j.status || "pending"}</span></td>
            <td style="color:var(--muted);font-size:12px;">${submitted}</td>
            <td id="ac-${j.id}"></td>`;
          tbody.appendChild(tr);
          renderJobActions(j);
        });

        const table = document.createElement("table");
        table.innerHTML = `<thead><tr>
          <th>Title</th><th>Company</th><th>Domain</th><th>Type</th><th>Status</th><th>Submitted</th><th>Actions</th>
        </tr></thead>`;
        table.appendChild(tbody);
        container.innerHTML = "";
        container.appendChild(table);
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="empty-state">Failed to load jobs.</div>`;
      }
    }

    function renderJobActions(j) {
      const cell = document.getElementById(`ac-${j.id}`);
      if (!cell) return;
      if (j.status === "expired") {
        cell.innerHTML = `<span style="color:var(--muted);font-size:13px;">Expired</span>`;
        return;
      }
      if (j.status === "live") {
        const wrap = document.createElement("div");
        wrap.className = "action-row";
        const featLabel = document.createElement("label");
        featLabel.className = "featured-toggle";
        featLabel.innerHTML = `<input type="checkbox" ${j.featured ? "checked" : ""}> Featured`;
        const cb = featLabel.querySelector("input");
        cb.addEventListener("change", () => updateDoc(doc(db, "jobs", j.id), { featured: cb.checked }));
        const expBtn = document.createElement("button");
        expBtn.className = "reject-btn";
        expBtn.textContent = "Expire";
        expBtn.addEventListener("click", () => setJobStatus(j, "expired"));
        wrap.append(featLabel, expBtn);
        cell.innerHTML = "";
        cell.appendChild(wrap);
        return;
      }
      // pending
      const wrap = document.createElement("div");
      wrap.className = "action-row";
      const featLabel = document.createElement("label");
      featLabel.className = "featured-toggle";
      featLabel.innerHTML = `<input type="checkbox"> Featured`;
      const approveBtn = document.createElement("button");
      approveBtn.className = "approve-btn";
      approveBtn.textContent = "Approve";
      approveBtn.addEventListener("click", async () => {
        const featured = featLabel.querySelector("input").checked;
        j.featured = featured;
        await updateDoc(doc(db, "jobs", j.id), { status: "live", featured });
        j.status = "live";
        document.getElementById(`sc-${j.id}`).innerHTML = `<span class="status-badge live">live</span>`;
        renderJobActions(j);
      });
      const rejectBtn = document.createElement("button");
      rejectBtn.className = "reject-btn";
      rejectBtn.textContent = "Reject";
      rejectBtn.addEventListener("click", () => setJobStatus(j, "expired"));
      wrap.append(featLabel, approveBtn, rejectBtn);
      cell.innerHTML = "";
      cell.appendChild(wrap);
    }

    async function setJobStatus(j, status) {
      await updateDoc(doc(db, "jobs", j.id), { status });
      j.status = status;
      document.getElementById(`sc-${j.id}`).innerHTML = `<span class="status-badge ${status}">${status}</span>`;
      renderJobActions(j);
    }
  </script>

</body>
</html>
